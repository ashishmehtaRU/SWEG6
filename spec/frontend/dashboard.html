<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Dashboard</title>
  </head>
  <body>
    <h2>LLM Dashboard</h2>
    <button id="logoutBtn" onclick="logout()" style="float: right">
      Logout
    </button>

    <div style="margin-top: 20px">
      <h3>Ask the AI:</h3>
      <textarea
        id="promptInput"
        rows="4"
        cols="50"
        placeholder="Enter your prompt here..."
      ></textarea>
      <br />
      <button onclick="submitPrompt()">Generate Output</button>
    </div>

    <div style="margin-top: 20px">
      <h3>Response:</h3>
      <div
        id="responseOutput"
        style="border: 1px solid #ccc; padding: 10px; min-height: 100px"
      >
        <em>Awaiting input...</em>
      </div>
    </div>

    <script>
      // Handle LLM Inference request
      async function submitPrompt() {
        const promptText = document.getElementById("promptInput").value;
        const outputDiv = document.getElementById("responseOutput");

        outputDiv.innerHTML = "<em>Processing...</em>";

        try {
          let res = await fetch("http://localhost:3000/api/llm/infer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: promptText }),
          });

          let data = await res.json();
          if (res.ok) {
            outputDiv.innerHTML = data.message; // Assuming backend returns { message: "..." }
          } else {
            outputDiv.innerHTML = `<span style="color: red;">Error: ${data.error || "Failed to fetch"}</span>`;
          }
        } catch (error) {
          outputDiv.innerHTML = `<span style="color: red;">Connection error. Is the server running?</span>`;
        }
      }

      // Handle Logout
      async function logout() {
        try {
          let res = await fetch("http://localhost:3000/api/logout", {
            method: "POST",
          });
          if (res.ok) {
            window.location.href = "/index.html";
          }
        } catch (error) {
          alert("Error logging out.");
        }
      }
    </script>
  </body>
</html>
