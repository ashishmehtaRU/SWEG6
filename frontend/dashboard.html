<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            transition: all 0.3s ease;
            min-height: 120px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea::placeholder {
            color: #bbb;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: flex-start;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #responseOutput {
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            overflow-y: auto;
            max-height: 400px;
            color: #333;
        }

        #responseOutput em {
            color: #999;
            font-style: italic;
        }

        .loading {
            color: #667eea;
            font-weight: 600;
        }

        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .success {
            color: #27ae60;
            background: #d5f4e6;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 24px;
            color: #333;
            font-weight: 700;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            .submit-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 LLM Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="content">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Prompts Generated</div>
                    <div class="stat-value" id="promptCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Status</div>
                    <div class="stat-value" id="status">Ready</div>
                </div>
            </div>

        <div class="section">
            <h3>📚 Conversation History</h3>
            <div class="input-group">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search conversations..."
                    style="flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px;"
                />
                <button class="submit-btn" onclick="searchConversations()">Search</button>
                <button class="submit-btn" onclick="createConversation()">New Chat</button>
            </div>
         <div id="conversationList" style="margin-top: 15px;"></div>
        </div>

            <div class="section">
                <h3>💬 Ask the AI:</h3>
                <textarea
                    id="promptInput"
                    placeholder="Enter your prompt here... (e.g., 'Write a poem about nature')"
                ></textarea>
                <div class="input-group">
                    <button class="submit-btn" onclick="submitPrompt()" id="submitBtn">Generate Output</button>
                </div>
            </div>

            <div class="section">
                <h3>📝 Response:</h3>
                <div id="responseOutput">
                    <em>Awaiting input...</em>
                </div>
            </div>

            <div class="section">
            <h3>⭐ Leave a Review</h3>
            <textarea
              id="reviewInput"
             placeholder="Write your review here..."
             style="min-height: 100px;"
            ></textarea>
            <div class="input-group">
                <button class="submit-btn" onclick="submitReview()">Submit Review</button>
          </div>
            <div id="reviewStatus"></div>
             </div>

             <div class="section">
                  <h3>🗂 Recent Reviews</h3>
                    <div id="reviewList"></div>
             </div>

             </div>
         </div>

  <script>
    let promptCounter = 0;
    let currentConversationId = null;
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    let currentUserId = loggedInUser ? loggedInUser.id : null;

    if (!currentUserId) {
         alert("No logged in user found. Please log in again.");
        window.location.href = "login.html";
    }

    async function createConversation() {
        try {
            let res = await fetch("http://localhost:3000/api/conversations", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: currentUserId,
                    title: "New Conversation"
                }),
            });

            let data = await res.json();

            if (res.ok) {
                currentConversationId = data.conversationId;
                document.getElementById("status").textContent = "Chat Created";
                loadConversations();
                document.getElementById("responseOutput").innerHTML = "<em>New conversation started.</em>";
            } else {
                document.getElementById("responseOutput").innerHTML =
                    `<div class="error">❌ ${data.error || "Failed to create conversation"}</div>`;
            }
        } catch (error) {
            document.getElementById("responseOutput").innerHTML =
                `<div class="error">❌ Connection error creating conversation</div>`;
        }
    }

    async function loadConversations() {
        try {
            let res = await fetch(`http://localhost:3000/api/conversations/${currentUserId}`);
            let data = await res.json();

            const listDiv = document.getElementById("conversationList");
            listDiv.innerHTML = "";

            if (!data || data.length === 0) {
                listDiv.innerHTML = "<em>No conversations yet.</em>";
                return;
            }

            data.forEach(conv => {
                const item = document.createElement("div");
                item.style.padding = "10px";
                item.style.marginBottom = "10px";
                item.style.border = "1px solid #ddd";
                item.style.borderRadius = "8px";
                item.style.cursor = "pointer";
                item.innerHTML = `
                    <strong>${conv.title || "Untitled Conversation"}</strong><br>
                    <small>ID: ${conv.id}</small>
                `;
                item.onclick = () => loadConversationMessages(conv.id);
                listDiv.appendChild(item);
            });
        } catch (error) {
            document.getElementById("conversationList").innerHTML =
                `<div class="error">❌ Failed to load conversations</div>`;
        }
    }

    async function searchConversations() {
        const q = document.getElementById("searchInput").value.trim();

        try {
            let res = await fetch(`http://localhost:3000/api/conversations/search/${currentUserId}?q=${encodeURIComponent(q)}`);
            let data = await res.json();

            const listDiv = document.getElementById("conversationList");
            listDiv.innerHTML = "";

            if (!data || data.length === 0) {
                listDiv.innerHTML = "<em>No matching conversations found.</em>";
                return;
            }

            data.forEach(conv => {
                const item = document.createElement("div");
                item.style.padding = "10px";
                item.style.marginBottom = "10px";
                item.style.border = "1px solid #ddd";
                item.style.borderRadius = "8px";
                item.style.cursor = "pointer";
                item.innerHTML = `
                    <strong>${conv.title || "Untitled Conversation"}</strong><br>
                    <small>ID: ${conv.id}</small>
                `;
                item.onclick = () => loadConversationMessages(conv.id);
                listDiv.appendChild(item);
            });
        } catch (error) {
            document.getElementById("conversationList").innerHTML =
                `<div class="error">❌ Search failed</div>`;
        }
    }

    async function loadConversationMessages(conversationId) {
    try {
        let res = await fetch(`http://localhost:3000/api/conversation/${conversationId}`);
        let data = await res.json();

        currentConversationId = conversationId;
        document.getElementById("status").textContent = "Loaded";

        if (!data || data.length === 0) {
            document.getElementById("responseOutput").innerHTML = "<em>No messages yet.</em>";
            return;
        }

        let html = "";
        data.forEach(msg => {
            if (msg.role === "assistant") {
                html += `<p><strong>AI Response:</strong> ${msg.content.replace(/^AI Response:\s*/i, "")}</p><br>`;
            } else {
                html += `<p><strong>User:</strong> ${msg.content}</p><br>`;
            }
        });

        document.getElementById("responseOutput").innerHTML = html;
    } catch (error) {
        document.getElementById("responseOutput").innerHTML =
            `<div class="error">❌ Failed to load messages</div>`;
    }
}

    async function submitPrompt() {
        const promptText = document.getElementById("promptInput").value.trim();
        const outputDiv = document.getElementById("responseOutput");
        const submitBtn = document.getElementById("submitBtn");

        if (!promptText) {
            outputDiv.innerHTML = '<div class="error">Please enter a prompt</div>';
            return;
        }

        if (!currentConversationId) {
            await createConversation();
        }

        outputDiv.innerHTML = '<span class="loading">⏳ Processing...</span>';
        submitBtn.disabled = true;

        try {
            let res = await fetch(`http://localhost:3000/api/conversation/${currentConversationId}/message`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: promptText }),
            });

            let data = await res.json();

            if (res.ok) {
                promptCounter++;
                document.getElementById("promptCount").textContent = promptCounter;
                document.getElementById("status").textContent = "Responded";
                document.getElementById("promptInput").value = "";
                await loadConversationMessages(currentConversationId);
                await loadConversations();
            } else {
                outputDiv.innerHTML = `<div class="error">❌ Error: ${data.error || "Failed to fetch"}</div>`;
            }
        } catch (error) {
            outputDiv.innerHTML = `<div class="error">❌ Connection error. Is the server running?</div>`;
        } finally {
            submitBtn.disabled = false;
        }
    }

    async function submitReview() {
        const reviewText = document.getElementById("reviewInput").value.trim();
        const reviewStatus = document.getElementById("reviewStatus");

        if (!reviewText) {
            reviewStatus.innerHTML = `<div class="error">Review cannot be empty</div>`;
            return;
        }

        try {
            let res = await fetch("http://localhost:3000/api/reviews", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: currentUserId,
                    review_text: reviewText
                }),
            });

            let data = await res.json();

            if (res.ok) {
                reviewStatus.innerHTML = `<div class="success">✓ Review submitted</div>`;
                document.getElementById("reviewInput").value = "";
                loadReviews();
            } else {
                reviewStatus.innerHTML = `<div class="error">❌ ${data.error || "Failed to submit review"}</div>`;
            }
        } catch (error) {
            reviewStatus.innerHTML = `<div class="error">❌ Connection error</div>`;
        }
    }

    async function loadReviews() {
        try {
            let res = await fetch("http://localhost:3000/api/reviews");
            let data = await res.json();

            const reviewList = document.getElementById("reviewList");
            reviewList.innerHTML = "";

            if (!data || data.length === 0) {
                reviewList.innerHTML = "<em>No reviews yet.</em>";
                return;
            }

            data.forEach(review => {
                const item = document.createElement("div");
                item.style.padding = "10px";
                item.style.marginBottom = "10px";
                item.style.border = "1px solid #ddd";
                item.style.borderRadius = "8px";
                item.innerHTML = `
                    <p>${review.review_text}</p>
                    <small>${review.created_at || ""}</small>
                `;
                reviewList.appendChild(item);
            });
        } catch (error) {
            document.getElementById("reviewList").innerHTML =
                `<div class="error">❌ Failed to load reviews</div>`;
        }
    }

    async function logout() {
        localStorage.removeItem("loggedInUser");
        if (!confirm("Are you sure you want to logout?")) {
            return;
        }

        try {
            let res = await fetch("http://localhost:3000/api/logout", {
                method: "POST",
            });
            if (res.ok) {
                window.location.href = "index.html";
            }
        } catch (error) {
            alert("Error logging out.");
        }
    }

    document.getElementById("promptInput").addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key === "Enter") {
            submitPrompt();
        }
    });

    loadConversations();
    loadReviews();
</script>
