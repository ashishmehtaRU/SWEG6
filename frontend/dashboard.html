<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            transition: all 0.3s ease;
            min-height: 120px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea::placeholder {
            color: #bbb;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: flex-start;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #responseOutput {
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            overflow-y: auto;
            max-height: 400px;
            color: #333;
        }

        #responseOutput em {
            color: #999;
            font-style: italic;
        }

        .loading {
            color: #667eea;
            font-weight: 600;
        }

        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .success {
            color: #27ae60;
            background: #d5f4e6;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 24px;
            color: #333;
            font-weight: 700;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 20px;
            }

            .input-group {
                flex-direction: column;
            }

            .submit-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 LLM Dashboard</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="content">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Prompts Generated</div>
                    <div class="stat-value" id="promptCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Status</div>
                    <div class="stat-value" id="status">Ready</div>
                </div>
            </div>

            <div class="section">
                <h3>💬 Ask the AI:</h3>
                <textarea
                    id="promptInput"
                    placeholder="Enter your prompt here... (e.g., 'Write a poem about nature')"
                ></textarea>
                <div class="input-group">
                    <button class="submit-btn" onclick="submitPrompt()" id="submitBtn">Generate Output</button>
                </div>
            </div>

            <div class="section">
                <h3>📝 Response:</h3>
                <div id="responseOutput">
                    <em>Awaiting input...</em>
                </div>
            </div>
        </div>
    </div>

    <script>
        let promptCounter = 0;

        // Handle LLM Inference request
        async function submitPrompt() {
            const promptText = document.getElementById("promptInput").value.trim();
            const outputDiv = document.getElementById("responseOutput");
            const submitBtn = document.getElementById("submitBtn");

            if (!promptText) {
                outputDiv.innerHTML = '<div class="error">Please enter a prompt</div>';
                return;
            }

            outputDiv.innerHTML = '<span class="loading">⏳ Processing...</span>';
            submitBtn.disabled = true;

            try {
                let res = await fetch("http://localhost:3000/api/llm/infer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: promptText }),
                });

                let data = await res.json();
                if (res.ok) {
                    promptCounter++;
                    document.getElementById("promptCount").textContent = promptCounter;
                    outputDiv.innerHTML = `<span class="success">✓ Generated:</span><br><br>${data.message || data.output || 'Response received'}`;
                } else {
                    outputDiv.innerHTML = `<div class="error">❌ Error: ${data.error || "Failed to fetch"}</div>`;
                }
            } catch (error) {
                outputDiv.innerHTML = `<div class="error">❌ Connection error. Is the server running?</div>`;
            } finally {
                submitBtn.disabled = false;
            }
        }

        // Handle Logout
        async function logout() {
            if (!confirm("Are you sure you want to logout?")) {
                return;
            }

            try {
                let res = await fetch("http://localhost:3000/api/logout", {
                    method: "POST",
                });
                if (res.ok) {
                    window.location.href = "index.html";
                }
            } catch (error) {
                alert("Error logging out.");
            }
        }

        // Allow Enter key to submit
        document.getElementById("promptInput").addEventListener("keydown", (e) => {
            if (e.ctrlKey && e.key === "Enter") {
                submitPrompt();
            }
        });
    </script>
  </body>
</html>
  </body>
</html>
