<!DOCTYPE html>
<html>
<head>
  <title>LLM Compare</title>
  <style>
    body{
      font-family: Arial;
      padding:40px;
      background:#f5f5f5;
    }
    textarea{
      width:100%;
      height:120px;
      font-size:16px;
      padding:10px;
    }
    button{
      margin-top:15px;
      padding:12px 20px;
      font-size:16px;
      cursor:pointer;
    }
    .box{
      background:white;
      padding:15px;
      margin-top:20px;
      border-radius:8px;
      box-shadow:0 0 5px rgba(0,0,0,.1);
    }
    h2{
      margin-bottom:5px;
    }
  </style>
</head>
<body>

<h1>Compare Multiple LLMs</h1>

<textarea id="prompt" placeholder="Enter your question..."></textarea>
<br>
<button onclick="compareModels()">Generate Responses</button>

<div class="box">
  <h2>Llama3</h2>
  <p id="r1"></p>
</div>

<div class="box">
  <h2>Mistral</h2>
  <p id="r2"></p>
</div>

<div class="box">
  <h2>Gemma</h2>
  <p id="r3"></p>
</div>

<script>
async function compareModels() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch("/api/llm/compare", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  document.getElementById("r1").innerText = data.responses[0].output;
  document.getElementById("r2").innerText = data.responses[1].output;
  document.getElementById("r3").innerText = data.responses[2].output;
}
</script>

</body>
</html>
